name: Compile & Release

# Triggers the workflow manually via the GitHub Actions tab
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version Tag (e.g., v48.480.0.0)'
        required: true
        default: 'v48.480.0.0'

# Grants write permissions to create releases and tags
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install ps2exe module
        shell: powershell
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module -Name ps2exe -Force -AcceptLicense

      - name: Compile PS1 to EXE
        shell: powershell
        # Compiles the PowerShell script into a standalone Windows executable dynamically
        run: |
          # Automatically strips the 'v' prefix so PS2EXE doesn't throw a format error
          $cleanVersion = "${{ github.event.inputs.version }}".Replace("v", "")
          
          Invoke-PS2EXE -InputFile "APK-Installer-Uninstaller.ps1" -OutputFile "APK-Installer-Uninstaller.exe" -noConsole -iconFile "logo.ico" -title "APK Installer & Uninstaller" -description "Personal APK installer & Uninstaller via ADB" -version $cleanVersion -company "Chi_Cha" -product "APK Installer & Uninstaller" -copyright "© 2026 chihafuyu"

      - name: Create GitHub Release and Upload EXE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: APK-Installer-Uninstaller.exe
          # Automatically generates release notes based on commit history
          generate_release_notes: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
